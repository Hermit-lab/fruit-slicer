<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>切水果游戏 - 阿强切水果</title>
    <meta name="theme-color" content="#ffd700">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="阿强切水果">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <link rel="manifest" href="./manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(180deg, #2c1810 0%, #4a2c2a 50%, #1a1a2e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        #gameCanvas {
            border: 3px solid #ffd700;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            cursor: none;
            background: linear-gradient(180deg, #3d2817 0%, #2a1a15 100%);
        }

        /* UI 区域整体布局 */
        #ui {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
        }

        /* 品牌名称 */
        #brandName {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 0 0 40px rgba(255, 215, 0, 0.4);
            letter-spacing: 8px;
            padding: 15px 30px;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.1), transparent);
            border-radius: 10px;
            margin-bottom: 20px;
        }

        /* 统计栏 */
        .stats-row {
            display: flex;
            gap: 30px;
        }

        .stat {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.9) 0%, rgba(30, 30, 50, 0.9) 100%);
            padding: 15px 30px;
            border-radius: 25px;
            border: 2px solid #ffd700;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.2);
            color: #ffd700;
            font-size: 20px;
            font-weight: bold;
            min-width: 160px;
            text-align: center;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .stat label {
            color: #fff;
            margin-right: 10px;
            font-size: 18px;
        }

        /* 自定义鼠标 - 简约高级版 */
        #customCursor {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            display: none;
        }

        #cursorBlade {
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            display: none;
        }

        /* 简约光点光标 */
        .cursor-dot {
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #fff 0%, rgba(255, 255, 255, 0.9) 40%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6), 0 0 40px rgba(255, 255, 255, 0.3);
        }

        /* 外圈光晕 */
        .cursor-ring {
            position: absolute;
            width: 32px;
            height: 32px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.1s, height 0.1s, border-color 0.1s;
        }

        .cursor-active .cursor-ring {
            width: 24px;
            height: 24px;
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* 刀光轨迹容器 */
        #slashContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9997;
        }

        .slash {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.95), transparent);
            border-radius: 2px;
            transform-origin: center;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
            animation: slashFade 0.25s ease-out forwards;
        }

        @keyframes slashFade {
            0% { opacity: 1; width: 30px; }
            100% { opacity: 0; width: 10px; }
        }

        @keyframes cursorPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        @keyframes goldenFlash {
            0% { opacity: 0; }
            30% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes bombFlash {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* 连击数字弹出效果 */
        .combo-popup {
            position: fixed;
            font-weight: bold;
            pointer-events: none;
            z-index: 9996;
            animation: comboPop 0.8s ease-out forwards;
        }

        @keyframes comboPop {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0.5) rotate(-10deg);
            }
            20% {
                opacity: 1;
                transform: translateY(-20px) scale(1.2) rotate(0deg);
            }
            50% {
                transform: translateY(-40px) scale(1) rotate(5deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-80px) scale(0.8) rotate(0deg);
            }
        }

        @keyframes bombFlash {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        #comboDisplay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 56px;
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            z-index: 5;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 10px;
            z-index: 10;
        }

        #startScreen h1, #gameOverScreen h1 {
            color: #ffd700;
            font-size: 48px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        #startScreen p, #gameOverScreen p {
            color: #ccc;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .btn {
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            color: #1a1a2e;
            border: none;
            padding: 15px 50px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
        }

        .hidden {
            display: none !important;
        }

        #finalScore {
            font-size: 42px;
            color: #ffd700;
            margin-bottom: 25px;
        }

        #newRecord {
            font-size: 28px;
            color: #ff6b6b;
            margin-bottom: 15px;
        }

        /* 欢迎界面 */
        #welcomeScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.92);
            border-radius: 10px;
            z-index: 10;
        }

        #welcomeScreen h1 {
            color: #ffd700;
            font-size: 42px;
            margin-bottom: 40px;
            letter-spacing: 8px;
        }

        .welcome-fruits {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            font-size: 50px;
        }

        .welcome-fruits span {
            opacity: 0;
            animation: welcomeFruitIn 0.5s ease-out forwards;
        }

        .welcome-fruits span:nth-child(1) { animation-delay: 0.1s; }
        .welcome-fruits span:nth-child(2) { animation-delay: 0.15s; }
        .welcome-fruits span:nth-child(3) { animation-delay: 0.2s; }
        .welcome-fruits span:nth-child(4) { animation-delay: 0.25s; }
        .welcome-fruits span:nth-child(5) { animation-delay: 0.3s; }
        .welcome-fruits span:nth-child(6) { animation-delay: 0.35s; }

        @keyframes welcomeFruitIn {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.5);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        #welcomeScreen p {
            color: #888;
            font-size: 14px;
            margin-top: 20px;
        }

        /* 刀光轨迹容器 */
        #slashContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9997;
        }

        .slash {
            position: absolute;
            background: linear-gradient(90deg, rgba(100, 180, 255, 0.8), rgba(255, 255, 255, 0.9), rgba(100, 180, 255, 0.8));
            border-radius: 3px;
            transform-origin: center;
            box-shadow: 0 0 15px rgba(100, 180, 255, 0.8);
            animation: slashFade 0.3s ease-out forwards;
        }

        @keyframes slashFade {
            0% { opacity: 1; transform: scaleX(1); }
            100% { opacity: 0; transform: scaleX(0.5); }
        }
    </style>
</head>
<body>
    <!-- 自定义鼠标 - 简约高级版 -->
    <div id="customCursor">
        <div class="cursor-dot"></div>
        <div class="cursor-ring"></div>
    </div>
    <div id="slashContainer"></div>

    <div id="gameContainer">
        <div id="ui">
            <div id="brandName">🥭 阿强水果铺 🥭</div>
            <div class="stats-row">
                <div class="stat">
                    <label>🏆 分数</label>
                    <span id="score">0</span>
                </div>
                <div class="stat">
                    <label>❤️ 生命</label>
                    <span id="lives">❤️❤️❤️</span>
                </div>
                <div class="stat">
                    <label>⭐ 最高分</label>
                    <span id="highScore">0</span>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div id="comboDisplay"></div>

        <!-- 欢迎界面 -->
        <div id="welcomeScreen">
            <h1>阿强水果铺</h1>
            <div class="welcome-fruits">
                <span>🍉</span>
                <span>🍊</span>
                <span>🥝</span>
                <span>🍓</span>
                <span>🫐</span>
                <span>🥭</span>
            </div>
            <button class="btn" onclick="game.start()">开始游戏</button>
            <p>滑动鼠标切割水果 · 不要切到炸弹</p>
        </div>

        <!-- 游戏结束界面 -->
        <div id="gameOverScreen" class="hidden">
            <h1>游戏结束</h1>
            <div id="newRecord" class="hidden">🎉 新纪录！🎉</div>
            <div id="finalScore">最终得分：0</div>
            <button class="btn" onclick="game.start()">再玩一次</button>
        </div>
    </div>

    <script src="game.js"></script>
    <script>
        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then((registration) => {
                    console.log('[PWA] Service Worker 注册成功:', registration.scope);
                })
                .catch((error) => {
                    console.log('[PWA] Service Worker 注册失败:', error);
                });
        }
    </script>
</body>
</html>
