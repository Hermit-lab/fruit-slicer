<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>切水果游戏 - 阿强切水果</title>
    <meta name="theme-color" content="#ffd700">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="阿强切水果">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="./icon-192.png">
    <link rel="manifest" href="./manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #2c1810 0%, #4a2c2a 50%, #1a1a2e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        #gameContainer {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            max-width: 100%;
            max-height: 100%;
        }

        /* UI 区域整体布局 */
        #ui {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 10px;
        }

        /* 品牌名称 */
        #brandName {
            font-size: clamp(18px, 4vw, 28px);
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 0 0 40px rgba(255, 215, 0, 0.4);
            letter-spacing: 0.5em;
            padding: 10px 20px;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.1), transparent);
            border-radius: 10px;
            margin-bottom: 10px;
            white-space: nowrap;
        }

        /* 统计栏 */
        .stats-row {
            display: flex;
            gap: clamp(8px, 2vw, 30px);
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.9) 0%, rgba(30, 30, 50, 0.9) 100%);
            padding: clamp(8px, 2vw, 15px) clamp(12px, 3vw, 30px);
            border-radius: 25px;
            border: 2px solid #ffd700;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.2);
            color: #ffd700;
            font-size: clamp(14px, 3vw, 20px);
            font-weight: bold;
            min-width: clamp(80px, 20vw, 160px);
            text-align: center;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .stat label {
            color: #fff;
            margin-right: 5px;
            font-size: clamp(12px, 2.5vw, 18px);
        }

        /* 游戏 Canvas - 响应式 */
        #gameCanvas {
            border: clamp(2px, 0.5vw, 3px) solid #ffd700;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            cursor: none;
            background: linear-gradient(180deg, #3d2817 0%, #2a1a15 100%);
            max-width: 100%;
            max-height: calc(100vh - 150px);
            touch-action: none;
        }

        /* 自定义鼠标 - 仅在非触摸设备显示 */
        @media (hover: hover) {
            #customCursor {
                display: none;
            }
        }
        @media (hover: none) {
            #customCursor {
                display: none !important;
            }
        }

        #customCursor {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
        }

        #cursorBlade {
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            display: none;
        }

        .cursor-dot {
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #fff 0%, rgba(255, 255, 255, 0.9) 40%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6), 0 0 40px rgba(255, 255, 255, 0.3);
        }

        .cursor-ring {
            position: absolute;
            width: 32px;
            height: 32px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.1s, height 0.1s, border-color 0.1s;
        }

        .cursor-active .cursor-ring {
            width: 24px;
            height: 24px;
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* 刀光轨迹容器 */
        #slashContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9997;
        }

        .slash {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.95), transparent);
            border-radius: 2px;
            transform-origin: center;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
            animation: slashFade 0.25s ease-out forwards;
        }

        @keyframes slashFade {
            0% { opacity: 1; width: 30px; }
            100% { opacity: 0; width: 10px; }
        }

        @keyframes touchRipple {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
                border-width: 3px;
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(2);
                border-width: 0px;
            }
        }

        @keyframes cursorPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        @keyframes goldenFlash {
            0% { opacity: 0; }
            30% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes bombFlash {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* 连击数字弹出效果 */
        .combo-popup {
            position: fixed;
            font-weight: bold;
            pointer-events: none;
            z-index: 9996;
            animation: comboPop 0.8s ease-out forwards;
        }

        @keyframes comboPop {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0.5) rotate(-10deg);
            }
            20% {
                opacity: 1;
                transform: translateY(-20px) scale(1.2) rotate(0deg);
            }
            50% {
                transform: translateY(-40px) scale(1) rotate(5deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-80px) scale(0.8) rotate(0deg);
            }
        }

        #comboDisplay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(36px, 8vw, 56px);
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            z-index: 5;
        }

        #startScreen, #gameOverScreen, #welcomeScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 10px;
            z-index: 10;
        }

        #startScreen h1, #gameOverScreen h1, #welcomeScreen h1 {
            color: #ffd700;
            font-size: clamp(28px, 6vw, 48px);
            margin-bottom: clamp(15px, 3vw, 30px);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            text-align: center;
            padding: 0 20px;
        }

        #startScreen p, #gameOverScreen p, #welcomeScreen p {
            color: #ccc;
            font-size: clamp(12px, 2.5vw, 16px);
            margin-bottom: clamp(15px, 3vw, 30px);
            text-align: center;
            padding: 0 20px;
        }

        .btn {
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            color: #1a1a2e;
            border: none;
            padding: clamp(10px, 3vw, 15px) clamp(30px, 8vw, 50px);
            font-size: clamp(16px, 4vw, 20px);
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            touch-action: manipulation;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
        }

        .hidden {
            display: none !important;
        }

        #finalScore {
            font-size: clamp(28px, 6vw, 42px);
            color: #ffd700;
            margin-bottom: clamp(15px, 3vw, 25px);
        }

        #newRecord {
            font-size: clamp(20px, 5vw, 28px);
            color: #ff6b6b;
            margin-bottom: clamp(10px, 2vw, 15px);
        }

        .welcome-fruits {
            display: flex;
            gap: clamp(10px, 3vw, 20px);
            margin-bottom: clamp(20px, 5vw, 40px);
            font-size: clamp(30px, 8vw, 50px);
            flex-wrap: wrap;
            justify-content: center;
        }

        .welcome-fruits span {
            opacity: 0;
            animation: welcomeFruitIn 0.5s ease-out forwards;
        }

        .welcome-fruits span:nth-child(1) { animation-delay: 0.1s; }
        .welcome-fruits span:nth-child(2) { animation-delay: 0.15s; }
        .welcome-fruits span:nth-child(3) { animation-delay: 0.2s; }
        .welcome-fruits span:nth-child(4) { animation-delay: 0.25s; }
        .welcome-fruits span:nth-child(5) { animation-delay: 0.3s; }
        .welcome-fruits span:nth-child(6) { animation-delay: 0.35s; }

        @keyframes welcomeFruitIn {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.5);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes slashFade {
            0% { opacity: 1; transform: scaleX(1); }
            100% { opacity: 0; transform: scaleX(0.5); }
        }

        /* 横屏优化 */
        @media (orientation: landscape) and (max-height: 500px) {
            #brandName {
                font-size: clamp(14px, 3vw, 20px);
                letter-spacing: 0.3em;
                padding: 5px 15px;
                margin-bottom: 5px;
            }

            .stats-row {
                gap: clamp(5px, 1.5vw, 15px);
            }

            .stat {
                padding: clamp(6px, 1.5vw, 10px) clamp(10px, 2.5vw, 20px);
                font-size: clamp(12px, 2.5vw, 16px);
                min-width: clamp(60px, 15vw, 120px);
            }

            .stat label {
                font-size: clamp(10px, 2vw, 14px);
            }

            #ui {
                margin-bottom: 5px;
            }
        }

        /* 小屏幕优化 */
        @media (max-width: 375px) {
            .stats-row {
                gap: 5px;
            }

            .stat {
                min-width: 70px;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
    <!-- 自定义鼠标 - 简约高级版 -->
    <div id="customCursor">
        <div class="cursor-dot"></div>
        <div class="cursor-ring"></div>
    </div>
    <div id="slashContainer"></div>

    <div id="gameContainer">
        <div id="ui">
            <div id="brandName">🥭 阿强切水果 🥭</div>
            <div class="stats-row">
                <div class="stat">
                    <label>🏆 分数</label>
                    <span id="score">0</span>
                </div>
                <div class="stat">
                    <label>❤️ 生命</label>
                    <span id="lives">❤️❤️❤️</span>
                </div>
                <div class="stat">
                    <label>⭐ 最高分</label>
                    <span id="highScore">0</span>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="comboDisplay"></div>

        <!-- 欢迎界面 -->
        <div id="welcomeScreen">
            <h1>阿强切水果</h1>
            <div class="welcome-fruits">
                <span>🍉</span>
                <span>🍊</span>
                <span>🥝</span>
                <span>🍓</span>
                <span>🫐</span>
                <span>🥭</span>
            </div>
            <button class="btn" onclick="game.start()">开始游戏</button>
            <p>滑动手指切割水果 · 不要切到炸弹</p>
        </div>

        <!-- 游戏结束界面 -->
        <div id="gameOverScreen" class="hidden">
            <h1>游戏结束</h1>
            <div id="newRecord" class="hidden">🎉 新纪录！🎉</div>
            <div id="finalScore">最终得分：0</div>
            <button class="btn" onclick="game.start()">再玩一次</button>
        </div>
    </div>

    <script src="game.js"></script>
    <script>
        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then((registration) => {
                    console.log('[PWA] Service Worker 注册成功:', registration.scope);
                })
                .catch((error) => {
                    console.log('[PWA] Service Worker 注册失败:', error);
                });
        }
    </script>
</body>
</html>
